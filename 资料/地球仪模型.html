<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>地球仪模型 · 思贤学习站</title><link rel="icon" href="../images/logo.png">
<script type="importmap">{
  "imports": {
    "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:#0a0e1a;overflow:hidden;height:100vh}
#canvas-wrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#label-renderer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.controls{position:fixed;top:16px;right:16px;z-index:10;background:rgba(15,20,40,0.88);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:18px 20px;width:300px;color:#ddd;font-size:13px;backdrop-filter:blur(8px);max-height:calc(100vh - 32px);overflow-y:auto}
.controls h2{font-size:16px;color:#fff;margin-bottom:10px;text-align:center;letter-spacing:1px}
.controls h2 span{color:#5dade2}
.ctrl-group{margin-bottom:10px;padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:10px}
.ctrl-group label{display:block;font-size:11px;color:#aaa;margin-bottom:3px}
.ctrl-row{display:flex;gap:4px;align-items:center;margin-bottom:4px}
.ctrl-row input[type=number]{width:56px;padding:4px 6px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;font-size:13px;text-align:center;outline:none}
.ctrl-row input[type=number]:focus{border-color:#5dade2}
.ctrl-row select{padding:4px 4px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ddd;font-size:12px;outline:none}
.ctrl-row .pt-label{font-weight:700;font-size:14px;min-width:16px}
.pt-a{color:#ff6b6b}
.pt-b{color:#4ecdc4}
.btn-update{width:100%;padding:8px;border:none;border-radius:8px;background:linear-gradient(135deg,#5dade2,#2c6fbb);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px}
.btn-update:hover{opacity:.9}
.btn-preset{padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#bbb;font-size:11px;cursor:pointer;margin:2px}
.btn-preset:hover{background:rgba(255,255,255,0.12);color:#fff}
.presets{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px}
.result{background:rgba(255,255,255,0.05);border-radius:8px;padding:10px 12px;text-align:center;min-height:36px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px}
.result .dir-badge{display:inline-block;padding:2px 14px;border-radius:16px;font-size:18px;font-weight:700;letter-spacing:2px}
.result .dir-badge.north{background:rgba(93,173,226,0.25);color:#5dade2}
.result .dir-badge.south{background:rgba(255,107,107,0.25);color:#ff6b6b}
.result .dir-badge.east{background:rgba(241,196,15,0.25);color:#f1c40f}
.result .dir-badge.west{background:rgba(155,89,182,0.25);color:#bb8fce}
.result .dir-badge.ne{background:rgba(93,173,226,0.2);color:#85c1e9}
.result .dir-badge.nw{background:rgba(155,89,182,0.2);color:#bb8fce}
.result .dir-badge.se{background:rgba(255,107,107,0.2);color:#ff8a8a}
.result .dir-badge.sw{background:rgba(200,100,100,0.2);color:#e8a0a0}
.result .bearing{font-size:12px;color:#999}
.tip{text-align:center;font-size:11px;color:#666;margin-top:6px}
.tip kbd{background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:3px;font-size:10px}
.footer-link{text-align:center;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.footer-link a{color:#5dade2;font-size:12px;text-decoration:none}
.footer-link a:hover{text-decoration:underline}
@media(max-width:640px){.controls{top:auto;bottom:0;right:0;left:0;width:100%;border-radius:14px 14px 0 0;max-height:55vh;padding:14px 14px 10px}.controls h2{font-size:14px}}
</style></head><body>

<div id="canvas-wrap"></div>
<div id="label-renderer"></div>

<div class="controls">
  <h2>🌍 经纬网 <span>方向判断</span></h2>

  <div class="ctrl-group">
    <label>📍 点A（起点）</label>
    <div class="ctrl-row">
      <span class="pt-label pt-a">A</span>
      <input type="number" id="latA" value="40" min="-90" max="90" step="0.1">
      <select id="nsA"><option value="1">°N</option><option value="-1">°S</option></select>
      <input type="number" id="lngA" value="116" min="-180" max="180" step="0.1">
      <select id="ewA"><option value="1">°E</option><option value="-1">°W</option></select>
    </div>
    <label style="margin-top:4px">📍 点B（终点）</label>
    <div class="ctrl-row">
      <span class="pt-label pt-b">B</span>
      <input type="number" id="latB" value="31" min="-90" max="90" step="0.1">
      <select id="nsB"><option value="1">°N</option><option value="-1">°S</option></select>
      <input type="number" id="lngB" value="121" min="-180" max="180" step="0.1">
      <select id="ewB"><option value="1">°E</option><option value="-1">°W</option></select>
    </div>
  </div>

  <button class="btn-update" onclick="updateGlobe()">🔄 更新方向</button>

  <div class="presets">
    <button class="btn-preset" onclick="setPreset(40,116,31,121)">北京→上海</button>
    <button class="btn-preset" onclick="setPreset(0,0,30,60)">(0°,0°)→(30°N,60°E)</button>
    <button class="btn-preset" onclick="setPreset(30,120,30,90)">上海→成都</button>
    <button class="btn-preset" onclick="setPreset(40,-74,51,-0.1)">纽约→伦敦</button>
    <button class="btn-preset" onclick="setPreset(-33,151,35,139)">悉尼→东京</button>
  </div>

  <div class="result" id="result">← 输入坐标后点击更新</div>
  <div class="tip"><kbd>拖拽</kbd>旋转 · <kbd>滚轮</kbd>缩放</div>
  <div class="footer-link"><a href="../资料/地理.html">← 返回初中地理</a></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const R = 100;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e1a);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 1, 1000);
camera.position.set(250, 100, 250);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.getElementById('label-renderer').appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 120;
controls.maxDistance = 500;

// Lights
const alight = new THREE.AmbientLight(0x404060);
scene.add(alight);
const dlight = new THREE.DirectionalLight(0xffffff, 1.5);
dlight.position.set(200, 300, 200);
scene.add(dlight);
const dlight2 = new THREE.DirectionalLight(0x5dade2, 0.5);
dlight2.position.set(-200, -100, -200);
scene.add(dlight2);

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i=0;i<2000;i++) {
  const r = 800+Math.random()*300;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  starVerts.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.8 });
scene.add(new THREE.Points(starGeo, starMat));

// Globe group
const globe = new THREE.Group();
scene.add(globe);

// Base sphere
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0x1a5276,
  transparent: true,
  opacity: 0.35,
  side: THREE.DoubleSide,
  specular: 0x0a1a3a,
  shininess: 10
});
const sphere = new THREE.Mesh(new THREE.SphereGeometry(R, 48, 48), sphereMat);
globe.add(sphere);

// Grid lines group
const linesGroup = new THREE.Group();
globe.add(linesGroup);

// Point markers group
const markersGroup = new THREE.Group();
globe.add(markersGroup);

// Great circle path group
const pathGroup = new THREE.Group();
globe.add(pathGroup);

function deg(r) { return r * Math.PI / 180; }
function toXYZ(lat, lng, radius = R) {
  const phi = deg(90 - lat);
  const theta = deg(lng);
  return new THREE.Vector3(
    radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

function buildGrid() {
  while(linesGroup.children.length) linesGroup.remove(linesGroup.children[0]);

  const lineMat = new THREE.LineBasicMaterial({ color: 0x4a7a9a, transparent: true, opacity: 0.3 });

  // Latitudes every 30°
  for (let lat = -90; lat <= 90; lat += 30) {
    const pts = [];
    for (let lng = 0; lng <= 360; lng += 3) {
      const p = toXYZ(lat, lng);
      pts.push(p);
    }
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    const m = lat === 0
      ? new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.8 })
      : lineMat;
    linesGroup.add(new THREE.Line(g, m));
  }

  // Latitudes every 15° (thin)
  const thinMat = new THREE.LineBasicMaterial({ color: 0x3a5a7a, transparent: true, opacity: 0.15 });
  for (let lat = -75; lat <= 75; lat += 30) {
    if (lat % 30 === 0) continue;
    const pts = [];
    for (let lng = 0; lng <= 360; lng += 3) {
      pts.push(toXYZ(lat, lng));
    }
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    linesGroup.add(new THREE.Line(g, thinMat));
  }

  // Longitudes every 30°
  for (let lng = 0; lng < 360; lng += 30) {
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 3) {
      pts.push(toXYZ(lat, lng));
    }
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    const m = (lng === 0 || lng === 180)
      ? new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.4 })
      : lineMat;
    linesGroup.add(new THREE.Line(g, m));
  }

  // Longitudes every 15° (thin)
  for (let lng = 15; lng < 360; lng += 30) {
    if (lng % 30 === 0) continue;
    const pts = [];
    for (let lat = -90; lat <= 90; lat += 3) {
      pts.push(toXYZ(lat, lng));
    }
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    linesGroup.add(new THREE.Line(g, thinMat));
  }

  // Labels
  // Latitude labels
  const latLabels = [
    { lat: 90, text: '90°N' }, { lat: 66.5, text: '66.5°N' }, { lat: 60, text: '60°N' },
    { lat: 30, text: '30°N' }, { lat: 23.5, text: '23.5°N' },
    { lat: 0, text: '赤道 0°' },
    { lat: -23.5, text: '23.5°S' }, { lat: -30, text: '30°S' },
    { lat: -60, text: '60°S' }, { lat: -66.5, text: '66.5°S' }, { lat: -90, text: '90°S' }
  ];
  latLabels.forEach(({lat, text}) => {
    const pos = toXYZ(lat, 180);
    pos.multiplyScalar(1.08);
    const el = document.createElement('div');
    el.textContent = text;
    el.style.cssText = 'color:rgba(255,255,255,0.5);font-size:10px;text-shadow:0 0 4px rgba(0,0,0,0.9);white-space:nowrap';
    const label = new CSS2DObject(el);
    label.position.copy(pos);
    globe.add(label);
  });

  // Longitude labels (along equator)
  for (let lng = 0; lng < 360; lng += 30) {
    const pos = toXYZ(0, lng);
    pos.multiplyScalar(1.12);
    const el = document.createElement('div');
    el.textContent = lng <= 180 ? `${lng}°E` : `${360-lng}°W`;
    el.style.cssText = 'color:rgba(255,255,255,0.35);font-size:9px;text-shadow:0 0 4px rgba(0,0,0,0.9);white-space:nowrap';
    const label = new CSS2DObject(el);
    label.position.copy(pos);
    globe.add(label);
  }
}

function clearMarkers() {
  while(markersGroup.children.length) markersGroup.remove(markersGroup.children[0]);
  // Remove old labels from globe
  const toRemove = [];
  globe.children.forEach(c => {
    if (c.isCSS2DObject && (c.userData.isMarkerLabel || c.userData.isPathLabel)) toRemove.push(c);
  });
  toRemove.forEach(c => globe.remove(c));
}
function clearPath() {
  while(pathGroup.children.length) pathGroup.remove(pathGroup.children[0]);
  const toRemove = [];
  globe.children.forEach(c => {
    if (c.isCSS2DObject && c.userData.isPathLabel) toRemove.push(c);
  });
  toRemove.forEach(c => globe.remove(c));
}

function addMarker(lat, lng, label, color) {
  const pos = toXYZ(lat, lng);
  const size = 5;
  const sphereGeo = new THREE.SphereGeometry(size, 12, 12);
  const sphereMat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.3 });
  const mesh = new THREE.Mesh(sphereGeo, sphereMat);
  mesh.position.copy(pos);
  markersGroup.add(mesh);

  // Glow
  const glowGeo = new THREE.SphereGeometry(size * 2.5, 12, 12);
  const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.copy(pos);
  markersGroup.add(glow);

  // Label
  const el = document.createElement('div');
  el.textContent = label;
  el.style.cssText = `color:#fff;font-size:14px;font-weight:700;text-shadow:0 0 8px rgba(0,0,0,0.9),0 0 4px rgba(0,0,0,0.9);background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:4px;border:1px solid ${color}`;
  const labelObj = new CSS2DObject(el);
  const labelPos = pos.clone().multiplyScalar(1.15);
  labelObj.position.copy(labelPos);
  labelObj.userData.isMarkerLabel = true;
  globe.add(labelObj);
}

function drawGreatCircle(lat1, lng1, lat2, lng2) {
  const phi1 = deg(90 - lat1), theta1 = deg(lng1);
  const phi2 = deg(90 - lat2), theta2 = deg(lng2);

  const p1 = new THREE.Vector3(
    Math.sin(phi1)*Math.cos(theta1), Math.cos(phi1), Math.sin(phi1)*Math.sin(theta1)
  );
  const p2 = new THREE.Vector3(
    Math.sin(phi2)*Math.cos(theta2), Math.cos(phi2), Math.sin(phi2)*Math.sin(theta2)
  );

  const pts = [];
  const steps = 60;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const q = p1.clone().multiplyScalar(1 - t).add(p2.clone().multiplyScalar(t));
    q.normalize().multiplyScalar(R);
    pts.push(q);
  }

  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const m = new THREE.LineBasicMaterial({ color: 0xff6b6b, transparent: true, opacity: 0.7 });
  pathGroup.add(new THREE.Line(g, m));

  // Dashed extension line through the globe
  const pts2 = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const q = p1.clone().multiplyScalar(1 - t).add(p2.clone().multiplyScalar(t));
    q.normalize().multiplyScalar(R * 0.4);
    pts2.push(q);
  }
  const g2 = new THREE.BufferGeometry().setFromPoints(pts2);
  const m2 = new THREE.LineDashedMaterial({ color: 0xff6b6b, transparent: true, opacity: 0.15, dashSize: 2, gapSize: 2 });
  const line = new THREE.Line(g2, m2);
  line.computeLineDistances();
  pathGroup.add(line);

  // Direction arrow at midpoint
  const mid = pts[Math.floor(steps/2)];
  const dir = pts[Math.floor(steps/2)+1].clone().sub(pts[Math.floor(steps/2)-1].clone()).normalize();
  const arrowLen = 8;
  const arrow = new THREE.ArrowHelper(dir, mid, arrowLen, 0xff6b6b, 4, 3);
  pathGroup.add(arrow);
}

function calcDirection(lat1, lng1, lat2, lng2) {
  const dlat = lat2 - lat1;
  const dlng = lng2 - lng1;

  let ns = '', ew = '';
  if (Math.abs(dlat) < 0.01) ns = '';
  else ns = dlat > 0 ? '北' : '南';
  if (Math.abs(dlng) < 0.01) ew = '';
  else ew = dlng > 0 ? '东' : '西';

  let dir;
  if (ns && ew) dir = ns + ew;
  else if (ns) dir = '正' + ns;
  else if (ew) dir = '正' + ew;
  else dir = '相同位置';

  // Bearing
  const φ1 = deg(lat1), φ2 = deg(lat2);
  const Δλ = deg(lng2 - lng1);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  let bearing = Math.atan2(y, x) * 180 / Math.PI;
  bearing = (bearing + 360) % 360;

  return { dir, bearing, dlat, dlng };
}

window.updateGlobe = function() {
  const latA = parseFloat(document.getElementById('latA').value) * (parseInt(document.getElementById('nsA').value) || 1);
  const lngA = parseFloat(document.getElementById('lngA').value) * (parseInt(document.getElementById('ewA').value) || 1);
  const latB = parseFloat(document.getElementById('latB').value) * (parseInt(document.getElementById('nsB').value) || 1);
  const lngB = parseFloat(document.getElementById('lngB').value) * (parseInt(document.getElementById('ewB').value) || 1);

  clearMarkers();
  clearPath();

  addMarker(latA, lngA, 'A', 0xff6b6b);
  addMarker(latB, lngB, 'B', 0x4ecdc4);

  drawGreatCircle(latA, lngA, latB, lngB);

  const { dir, bearing, dlat, dlng } = calcDirection(latA, lngA, latB, lngB);

  const result = document.getElementById('result');
  const dirClass = {
    '东北': 'ne', '西北': 'nw', '东南': 'se', '西南': 'sw',
    '正北': 'north', '正南': 'south', '正东': 'east', '正西': 'west'
  }[dir] || '';
  result.innerHTML = dir === '相同位置'
    ? '<span style="color:#999">⚠️ 两点在同一位置</span>'
    : `<span class="dir-badge ${dirClass}">${dir}</span> <span class="bearing">方位角 ${bearing.toFixed(1)}°</span>`;
};

window.setPreset = function(lat1, lng1, lat2, lng2) {
  document.getElementById('latA').value = Math.abs(lat1);
  document.getElementById('nsA').value = lat1 >= 0 ? '1' : '-1';
  document.getElementById('lngA').value = Math.abs(lng1);
  document.getElementById('ewA').value = lng1 >= 0 ? '1' : '-1';
  document.getElementById('latB').value = Math.abs(lat2);
  document.getElementById('nsB').value = lat2 >= 0 ? '1' : '-1';
  document.getElementById('lngB').value = Math.abs(lng2);
  document.getElementById('ewB').value = lng2 >= 0 ? '1' : '-1';
  window.updateGlobe();
};

buildGrid();
window.updateGlobe();

// Animation
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
})();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>
