<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初中地理 · 思贤家教</title>
<link rel="icon" href="../images/logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f7fa;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
.head{max-width:1000px;margin:0 auto;padding:20px 20px 0}
.head a{color:#888;font-size:13px;text-decoration:none}
.head h1{font-size:26px;color:#1a1a2e;margin:8px 0 16px}
.tab-bar{display:flex;gap:0;max-width:1000px;margin:0 auto;border-bottom:2px solid #3498db}
.tab-btn{padding:10px 28px;font-size:15px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#888;transition:all .2s;border-radius:8px 8px 0 0;margin-bottom:-2px}
.tab-btn:hover{color:#3498db}
.tab-btn.active{background:#3498db;color:#fff}
.body{max-width:1000px;margin:0 auto;background:#fff;min-height:300px;padding:24px}
.pane{display:none;position:relative}
.pane.active{display:block}
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:300px;padding:30px 20px}
.lock-screen .lk-icon{font-size:46px;margin-bottom:10px}
.lock-screen .lk-title{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.lock-screen .lk-desc{font-size:13px;color:#999;line-height:1.6;margin-bottom:18px;max-width:340px}
.lock-screen .lk-box{background:#f5f7fa;border-radius:10px;padding:14px 18px;max-width:360px;width:100%;text-align:left}
.lock-screen .lk-box .lb-t{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.lock-screen .lk-box .lb-txt{font-size:13px;color:#555;line-height:1.8;padding:8px 12px;background:#fff;border-radius:6px;border:1px solid #eee;margin-bottom:8px;text-align:left;text-indent:0}
.lock-screen .lk-box .lb-btn{display:block;width:100%;padding:9px;background:#1a73e8;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.lock-screen .lk-box .lb-btn:hover{opacity:.85}
.lock-screen .lk-hint{font-size:11px;color:#bbb;margin-top:6px}
.cd{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border-top:3px solid #3498db}
.cd .t{font-weight:700;font-size:14px;color:#3498db;margin-bottom:4px}
.cd .d{font-size:13px;color:#555;line-height:1.7}
.tg{display:inline-block;font-size:11px;background:#eaf4fb;color:#3498db;padding:1px 8px;border-radius:4px;margin:2px}
.kb{max-width:800px;margin:0 auto}
.kb h2{font-size:20px;margin:28px 0 12px;padding-left:12px;border-left:4px solid #e74c3c;color:#2d3436}
.kb h3{font-size:16px;margin:16px 0 8px;color:#444}
.kb p{margin-bottom:8px;text-indent:2em;font-size:14px;line-height:1.9}
.kb .hl{color:#e74c3c;font-weight:700}
</style>
</head>
<body>
<div class="head"><a href="../资料库.html">← 返回资料库</a><h1>初中地理</h1></div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('model',this)">🌍 模型</button>
  <button class="tab-btn" onclick="switchTab('knowledge',this)">📖 知识点大全</button>
</div>
<div class="body">

<div class="pane active" id="tabModel">
<div class="lock-screen">
  <div class="lk-icon">🔒</div>
  <div class="lk-title">内容未解锁</div>
  <div class="lk-desc">转发推荐给好友，即可解锁完整学习内容</div>
  <div class="lk-box">
    <div class="lb-t">📋 转发文案</div>
    <div class="lb-txt">我家孩子在用思贤家教的辅导资料，数学几何模型和物理模型都有图解，各科知识点整理得很全，老师也很负责。推荐给有需要的家长，可以加微信了解一下~</div>
    <button class="lb-btn" onclick="copyTxt()">复制文案 · 分享给好友</button>
  </div>
  <div class="lk-hint">复制后分享到微信好友或朋友圈</div>
</div>


<div class="pane" id="tabKnowledge">
<div class="lock-screen">
  <div class="lk-icon">🔒</div>
  <div class="lk-title">内容未解锁</div>
  <div class="lk-desc">转发推荐给好友，即可解锁完整学习内容</div>
  <div class="lk-box">
    <div class="lb-t">📋 转发文案</div>
    <div class="lb-txt">我家孩子在用思贤家教的辅导资料，数学几何模型和物理模型都有图解，各科知识点整理得很全，老师也很负责。推荐给有需要的家长，可以加微信了解一下~</div>
    <button class="lb-btn" onclick="copyTxt()">复制文案 · 分享给好友</button>
  </div>
  <div class="lk-hint">复制后分享到微信好友或朋友圈</div>
</div>


</div>
<script>
function switchTab(name, btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active')});
  btn.classList.add('active');
  document.getElementById('tab'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
}
function copyTxt(){
  var txt = document.querySelector('.pane.active .lb-txt').textContent;
  var hint = document.querySelector('.pane.active .lk-hint');
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){hint.textContent = '✅ 已复制，分享给好友吧！';});
  } else {
    var ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    hint.textContent = '✅ 已复制，分享给好友吧！';
  }
}
</script>
</body>
</html>
