<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <link rel="icon" href="images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>思贤家教 · 算法助学</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f8f9fc; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .poster {
            width: 100%; max-width: 420px; background: #fff;
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        }

        /* ── Header ── */
        .poster-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 40%, #16213e 70%, #2d3436 100%);
            padding: 40px 28px 36px; text-align: center; position: relative;
        }
        .poster-header::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 70% 30%, rgba(100,181,246,0.10) 0%, transparent 60%);
        }
        .poster-header .brand { position: relative; z-index: 1; }
        .poster-header .brand-line1 {
            font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 4px; margin-bottom: 8px;
        }
        .poster-header .brand-name {
            font-size: 32px; font-weight: 700; color: #fff; letter-spacing: 6px; margin-bottom: 4px;
        }
        .poster-header .brand-sub {
            font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 2px;
        }

        .poster-header .divider {
            width: 50px; height: 2px; background: linear-gradient(90deg, #64b5f6, #bb86fc);
            margin: 18px auto; border-radius: 2px; position: relative; z-index: 1;
        }

        .poster-header .tagline {
            position: relative; z-index: 1; font-size: 20px; font-weight: 700;
            color: #fff; letter-spacing: 2px; line-height: 1.5;
        }
        .poster-header .tagline em {
            font-style: normal;
            background: linear-gradient(90deg, #64b5f6, #bb86fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* ── Body ── */
        .poster-body { padding: 28px 28px 24px; }

        .feature-row {
            display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px;
        }
        .feature-row .icon {
            flex-shrink: 0; width: 40px; height: 40px; border-radius: 12px;
            background: #f0f4ff; display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .feature-row .text { flex: 1; }
        .feature-row .text h3 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 2px; }
        .feature-row .text p { font-size: 13px; color: #888; line-height: 1.6; }

        .poster-body .price-line {
            background: linear-gradient(135deg, #f0f4ff, #f5f0ff);
            border-radius: 14px; padding: 16px 20px; margin-top: 8px; text-align: center;
        }
        .poster-body .price-line p { font-size: 14px; color: #444; line-height: 1.8; }
        .poster-body .price-line .hl { color: #1a1a2e; font-weight: 700; }
        .poster-body .price-line .free { background: #e67e22; color: #fff; padding: 1px 10px; border-radius: 10px; font-size: 12px; font-weight: 700; }

        /* ── Footer ── */
        .poster-footer {
            background: #1a1a2e; padding: 20px 28px; text-align: center;
        }
        .poster-footer p { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px; }
        .poster-footer .contact {
            color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 2px; margin-top: 4px;
        }
        .poster-footer .contact a { color: #fff; text-decoration: none; }

        /* ── Screenshot hint ── */
        .hint { text-align: center; margin-top: 12px; font-size: 12px; color: #bbb; }

        @media (max-width: 440px) {
            .poster { border-radius: 16px; }
            .poster-header { padding: 30px 22px 28px; }
            .poster-header .brand-name { font-size: 26px; }
            .poster-header .tagline { font-size: 17px; }
            .poster-body { padding: 22px 22px 20px; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 头部 -->
        <div class="poster-header">
            <div class="brand">
                <div class="brand-line1">商河本地 · 上门家教</div>
                <div class="brand-name">思贤家教</div>
                <div class="brand-sub">让每个孩子都能找到合适的老师</div>
            </div>
            <div class="divider"></div>
            <div class="tagline">
                错题拍一拍，<em>AI</em> 来出题
            </div>
        </div>

        <!-- 主体 -->
        <div class="poster-body">
            <div class="feature-row">
                <div class="icon">📸</div>
                <div class="text">
                    <h3>拍照录入错题</h3>
                    <p>把孩子的错题拍下来，AI 自动识别知识点</p>
                </div>
            </div>
            <div class="feature-row">
                <div class="icon">🔄</div>
                <div class="text">
                    <h3>生成变式训练</h3>
                    <p>针对薄弱点自动出同类题，举一反三</p>
                </div>
            </div>
            <div class="feature-row">
                <div class="icon">📊</div>
                <div class="text">
                    <h3>学情报告 + 路径规划</h3>
                    <p>分析学习状态，规划专属提升方向</p>
                </div>
            </div>
            <div class="feature-row">
                <div class="icon">📦</div>
                <div class="text">
                    <h3>出专属资料</h3>
                    <p>AI 分析 · 举一反三 · 巩固薄弱点</p>
                </div>
            </div>

            <div class="price-line">
                <p>📱 联系 <span class="hl">155-6412-8008</span><br>首次免费体验</p>
            </div>
        </div>

        <!-- 底部 -->
        <div class="poster-footer">
            <p>扫码联系 · 免费体验</p>
            <div class="contact">
                <a href="tel:15564128008">155-6412-8008</a>
            </div>
        </div>
    </div>

    <div class="hint">截图即可分享到朋友圈 / 家长群</div>
</body>
</html>
