services:
  - type: web
    name: sixian-edu
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app --worker-class gthread --bind 0.0.0.0:10000
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sixian-edu-db
          property: connectionString

databases:
  - name: sixian-edu-db
    plan: free
