<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <link rel="icon" href="/images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}思贤家教{% endblock %} · 思贤家教</title>
    <link rel="stylesheet" href="/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>

<div class="nav">
    <a href="/" class="logo-text">思贤家教</a>
    <a href="/" {% if request.endpoint == 'home' %}class="nav-active"{% endif %}>主页</a>
    <a href="/teachers" {% if request.endpoint in ('teachers', 'teacher_detail') %}class="nav-active"{% endif %}>选老师</a>
    <a href="/booking" {% if request.endpoint == 'booking' %}class="nav-active"{% endif %}>预约试听</a>
    <a href="/algo" {% if request.endpoint == 'algo' %}class="nav-active"{% endif %}>算法助学 <span class="nav-tag">免费体验</span></a>
    <a href="/exam-papers" {% if request.endpoint == 'exam_papers' %}class="nav-active"{% endif %}>真题库</a>
    <a href="/join" {% if request.endpoint == 'join' %}class="nav-active"{% endif %}>加入思贤</a>
    <a href="/covenant" {% if request.endpoint == 'covenant' %}class="nav-active"{% endif %}>思贤公约</a>
</div>

{% block content %}{% endblock %}

<div class="footer">
    <p>思贤家教 · 济南市商河县 · 电话 155-6412-8008</p>
</div>

</body>
</html>
