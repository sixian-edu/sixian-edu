<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}管理后台{% endblock %} · 思贤家教</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f8f9fc; display: flex; min-height: 100vh; }
.sidebar { width: 200px; background: #1a1a2e; color: #fff; padding: 24px 0; flex-shrink: 0; }
.sidebar h2 { font-size: 16px; padding: 0 20px; margin-bottom: 20px; }
.sidebar a { display: block; padding: 10px 20px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
.sidebar a:hover, .sidebar a.active { color: #fff; background: rgba(255,255,255,0.1); }
.main { flex: 1; padding: 32px; max-width: 1000px; }
.main h1 { font-size: 22px; margin-bottom: 24px; }
.stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); text-align: center; }
.stat-num { font-size: 32px; font-weight: 700; color: #1a1a2e; }
.stat-label { font-size: 13px; color: #888; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
th, td { padding: 10px 14px; text-align: left; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
th { background: #f8f9fc; font-weight: 600; color: #555; font-size: 13px; }
tr:hover { background: #fafbfc; }
.status { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
.status-pending { background: #fef3c7; color: #d97706; }
.status-confirmed { background: #dbeafe; color: #1d4ed8; }
.status-completed { background: #d1fae5; color: #059669; }
.status-cancelled { background: #fee2e2; color: #dc2626; }
.btn { display: inline-block; padding: 6px 16px; border-radius: 8px; font-size: 13px; text-decoration: none; border: none; cursor: pointer; font-weight: 600; }
.btn-primary { background: #1a1a2e; color: #fff; }
.btn-sm { padding: 4px 12px; font-size: 12px; }
.btn-edit { background: #f0f0f0; color: #333; }
.btn-danger { background: #fee2e2; color: #dc2626; }
.flash { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
.flash-success { background: #d1fae5; color: #059669; }
.inline-form { display: inline; }
.mb-16 { margin-bottom: 16px; }
.gap-8 { display: flex; gap: 8px; flex-wrap: wrap; }
@media (max-width: 680px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; padding: 12px 0; display: flex; flex-wrap: wrap; }
    .sidebar h2 { display: none; }
    .sidebar a { padding: 8px 16px; }
    .main { padding: 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="sidebar">
    <h2>思贤管理</h2>
    <a href="/admin" {% if request.path == '/admin' %}class="active"{% endif %}>控制台</a>
    <a href="/admin/teachers" {% if '/teachers' in request.path %}class="active"{% endif %}>老师管理</a>
    <a href="/admin/bookings" {% if '/bookings' in request.path %}class="active"{% endif %}>预约管理</a>
    <a href="/admin/testimonials" {% if '/testimonials' in request.path %}class="active"{% endif %}>评价管理</a>
    <a href="/admin/logout" style="margin-top:20px;color:rgba(255,255,255,0.4);">退出登录</a>
</div>
<div class="main">
    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    {% for category, msg in msgs %}
    <div class="flash flash-{{ category }}">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
