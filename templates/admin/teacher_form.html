{% extends "admin/base_admin.html" %}
{% block title %}{{ "编辑老师" if teacher else "添加老师" }}{% endblock %}
{% block content %}
<h1>{{ "编辑老师" if teacher else "添加老师" }}</h1>

<form method="POST" style="background:#fff;border-radius:12px;padding:28px;box-shadow:0 1px 8px rgba(0,0,0,0.04);max-width:600px;">
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">姓名 *</label>
        <input type="text" name="name" value="{{ teacher.name if teacher else '' }}" required style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">标识 (slug) *</label>
        <input type="text" name="slug" value="{{ teacher.slug if teacher else '' }}" required placeholder="如: liu-laoshi" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">头像路径</label>
        <input type="text" name="avatar" value="{{ teacher.avatar if teacher else '' }}" placeholder="如: images/001.jpg" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">学历</label>
        <input type="text" name="education" value="{{ teacher.education if teacher else '' }}" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">教龄</label>
        <input type="text" name="experience" value="{{ teacher.experience if teacher else '' }}" placeholder="如: 教龄 4 年" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">擅长标签</label>
        <input type="text" name="special_badge" value="{{ teacher.special_badge if teacher else '' }}" placeholder="如: 数学 · 物理" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">科目（每行一个）</label>
        {% set subs = teacher.subject_list() if teacher else [] %}
        <textarea name="subjects_text" rows="4" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">{{ "\n".join(subs) if subs else "" }}</textarea>
        <input type="hidden" name="subjects" id="subjectsInput" value="">
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">年级</label>
        {% set gl = teacher.grade_list() if teacher else [] %}
        <label style="font-size:13px;margin-right:12px;"><input type="checkbox" name="grade_levels" value="primary" {% if "primary" in gl %}checked{% endif %}> 小学</label>
        <label style="font-size:13px;margin-right:12px;"><input type="checkbox" name="grade_levels" value="middle" {% if "middle" in gl %}checked{% endif %}> 初中</label>
        <label style="font-size:13px;"><input type="checkbox" name="grade_levels" value="high" {% if "high" in gl %}checked{% endif %}> 高中</label>
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">简介</label>
        <textarea name="bio" rows="5" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">{{ teacher.bio if teacher else '' }}</textarea>
    </div>
    <div style="margin-bottom:14px;">
        <label style="display:block;font-size:14px;font-weight:600;margin-bottom:4px;">排序</label>
        <input type="number" name="sort_order" value="{{ teacher.sort_order if teacher else 0 }}" style="width:80px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
    </div>
    <div style="margin-bottom:14px;">
        <label style="font-size:13px;margin-right:16px;"><input type="checkbox" name="is_active" {% if not teacher or teacher.is_active %}checked{% endif %}> 启用</label>
        <label style="font-size:13px;"><input type="checkbox" name="is_placeholder" {% if teacher and teacher.is_placeholder %}checked{% endif %}> 占位（即将上线）</label>
    </div>
    <button type="submit" class="btn btn-primary" style="padding:10px 32px;font-size:14px;">保存</button>
    <a href="/admin/teachers" style="margin-left:12px;color:#888;font-size:14px;">取消</a>
</form>

<script>
document.querySelector('form').addEventListener('submit', function() {
    var ta = this.querySelector('[name="subjects_text"]');
    var hidden = this.querySelector('[name="subjects"]');
    if (ta) {
        hidden.value = JSON.stringify(ta.value.split('\n').filter(Boolean));
    }
});
</script>
{% endblock %}
