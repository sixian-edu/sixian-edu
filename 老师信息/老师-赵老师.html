<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <link rel="icon" href="../images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵老师 · 思贤家教</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif; background: #f8f9fc; color: #2d3436; line-height: 1.6; }
        .nav { background: #1a1a2e; padding: 0 20px; display: flex; justify-content: center; align-items: center; gap: 4px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
        .nav .logo { height: 40px; margin-right: auto; display: block; }
        .nav a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 14px 18px; font-size: 14px; transition: color 0.2s; }
        .nav a:hover { color: #fff; }
        .back-link { max-width: 800px; margin: 0 auto; padding: 20px 20px 0; }
        .back-link a { color: #888; font-size: 14px; text-decoration: none; }
        .back-link a:hover { color: #1a1a2e; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 48px; }
        .placeholder-hero { background: #fff; border-radius: 16px; padding: 60px 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); text-align: center; }
        .placeholder-hero .icon { font-size: 48px; margin-bottom: 16px; }
        .placeholder-hero h2 { font-size: 22px; margin-bottom: 8px; }
        .placeholder-hero p { font-size: 14px; color: #888; max-width: 400px; margin: 0 auto 20px; }
        .placeholder-hero .btn { display: inline-block; background: #1a1a2e; color: #fff; padding: 10px 28px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; }
        .footer { text-align: center; padding: 24px 20px; font-size: 13px; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="nav">
    <a href="../思贤家教.html">主页</a>
    <a href="../老师.html">选老师</a>
</div>
<div class="back-link"><a href="../老师.html">← 返回老师列表</a></div>
<div class="container">
    <div class="placeholder-hero">
        <div class="icon">🧑‍🏫</div>
        <h2>赵老师</h2>
        <p>师范院校 汉语言文学专业 本科 · 擅长小学语文、初中语文、阅读与作文</p>
        <p style="color: #f39c12; font-weight: 600;">老师信息正在完善中，敬请期待</p>
        <br>
        <a class="btn" onclick="openShareWall()" style="cursor:pointer">获取联系方式</a>
    </div>
</div>
<div class="footer"><p>思贤家教 · 济南市商河县 · <span class="contact-trigger" onclick="openShareWall()">获取联系方式</span></p>
<style>
.back-to-top{position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;background:#1a1a2e;color:#fff;border:none;font-size:20px;cursor:pointer;opacity:0;visibility:hidden;transition:all .3s;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:999;display:flex;align-items:center;justify-content:center}
.back-to-top.show{opacity:1;visibility:visible}
.back-to-top:hover{opacity:.85;transform:translateY(-2px)}
</style>
<button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部">↑</button>
<script>window.addEventListener('scroll',function(){document.querySelector('.back-to-top').classList.toggle('show',window.scrollY>300)});</script>
<style>
.share-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}.share-overlay.active{display:flex}.share-modal{background:#fff;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:shareIn .3s ease}@keyframes shareIn{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}.share-modal .share-icon{font-size:48px;margin-bottom:12px}.share-modal h3{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:8px}.share-modal .share-desc{font-size:14px;color:#666;margin-bottom:20px;line-height:1.7}.share-msg-box{background:#f8f9fc;border-radius:12px;padding:14px 16px;margin-bottom:16px;text-align:left;border:1px solid #eee}.share-msg-box p{font-size:13px;color:#555;line-height:1.8;margin:0}.copy-btn{width:100%;padding:12px;border:2px solid #1a1a2e;background:transparent;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:6px}.copy-btn:hover{background:#1a1a2e;color:#fff}.copy-btn.copied{background:#059669;border-color:#059669;color:#fff}.copy-hint{font-size:12px;color:#999;margin-bottom:20px}.shared-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}.shared-btn:hover{opacity:.9}.shared-btn:disabled{opacity:.35;cursor:not-allowed}.contact-trigger{color:#1a1a2e;text-decoration:underline;cursor:pointer}.contact-trigger:hover{opacity:.7}
</style>
<div class="share-overlay" id="shareOverlay">
  <div class="share-modal">
    <div class="share-icon">🔗</div>
    <h3>分享即可获取联系方式</h3>
    <p class="share-desc">将此网站分享给微信好友或发到朋友圈</p>
    <div class="share-msg-box"><p id="shareText"></p></div>
    <button class="copy-btn" id="copyBtn">📋 复制分享文案</button>
    <p class="copy-hint" id="copyHint">复制后粘贴发送给微信好友或发到朋友圈</p>
    <button class="shared-btn" id="sharedBtn" disabled>我已分享，查看联系方式 →</button>
  </div>
</div>
<script>
(function() {
  var url = window.location.origin + window.location.pathname;
  var shareTxt = '📚 思贤家教——商河本地专业上门家教！优秀老师一对一辅导，量身定制学习计划，让孩子成绩稳步提升。快来了解～ ' + url;
  var hasCopied = false;
  var overlay = document.getElementById('shareOverlay');
  var shareTextEl = document.getElementById('shareText');
  var copyBtn = document.getElementById('copyBtn');
  var copyHint = document.getElementById('copyHint');
  var sharedBtn = document.getElementById('sharedBtn');

  window.openShareWall = function() {
    if (window._shareTimeout) clearTimeout(window._shareTimeout);
    shareTextEl.textContent = shareTxt;
    overlay.classList.add('active');
    hasCopied = false;
    sharedBtn.disabled = true;
    copyBtn.textContent = '📋 复制分享文案';
    copyBtn.classList.remove('copied');
    copyHint.textContent = '复制后粘贴发送给微信好友或发到朋友圈';
  };

  copyBtn.addEventListener('click', function() {
    if (window._shareTimeout) clearTimeout(window._shareTimeout);
    var text = shareTextEl.textContent;
    function done() {
      copyBtn.textContent = '✅ 已复制';
      copyBtn.classList.add('copied');
      copyHint.textContent = '⏳ 检测到转发朋友圈，自动获取联系方式...';
      window._shareTimeout = setTimeout(function() {
        hasCopied = true;
        sharedBtn.disabled = false;
        copyHint.textContent = '✅ 点击下方按钮查看联系方式';
      }, 10000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); done();
    }
  });

  sharedBtn.addEventListener('click', function() {
    if (!hasCopied) return;
    overlay.classList.remove('active');
    if (window._shareTimeout) clearTimeout(window._shareTimeout);
    var triggers = document.querySelectorAll('.contact-trigger');
    for (var i = 0; i < triggers.length; i++) {
      triggers[i].outerHTML = '<b>155-6412-8008</b>';
    }
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === this) {
      overlay.classList.remove('active');
      if (window._shareTimeout) clearTimeout(window._shareTimeout);
    }
  });
})();
</script>
</body>
</html>
