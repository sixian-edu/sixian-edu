<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约试听 · 思贤学习站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff; padding: 64px 20px; text-align: center; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(52,152,219,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(155,89,182,0.12) 0%, transparent 50%);
        }
        .hero::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }
        .hero h1 { font-size: 32px; margin-bottom: 8px; position: relative; z-index: 1; }
        .hero p { font-size: 15px; opacity: 0.8; max-width: 500px; margin: 0 auto; position: relative; z-index: 1; }

        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px 48px; }
        .card { background: #fff; border-radius: 16px; padding: 28px 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 24px; }

        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #1a1a2e; display: inline-block; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1a1a2e; }
        .form-group textarea { resize: vertical; min-height: 70px; }
        .submit-btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; transition: opacity 0.2s; }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .success-msg { display: none; text-align: center; padding: 32px 20px; }
        .success-msg .icon { font-size: 48px; margin-bottom: 12px; }
        .success-msg h3 { font-size: 18px; margin-bottom: 6px; color: #1a1a2e; }
        .success-msg p { font-size: 14px; color: #888; }

        .contact-info { text-align: center; margin-top: 16px; font-size: 14px; color: #888; }
        .contact-info a { color: #1a1a2e; font-weight: 600; text-decoration: none; }

        .footer { text-align: center; padding: 24px 20px; font-size: 13px; color: #888; border-top: 1px solid #eee; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 24px; }
            .card { padding: 20px; }
        }
        
    </style>
</head>
<body>

<div class="nav">
    <a href="思贤学习站.html" class="logo-text">思贤学习站</a>
    <a href="思贤学习站.html">首页</a>
    <a href="学习专区.html" class="nav-active">学习专区</a>
    <a href="学习方法.html">学习方法</a>
    <a href="算法助学.html">AI工具 <span class="nav-tag">免费体验</span></a>
    <a href="资料库.html">资源库</a>
    <a href="成长社区.html">成长社区</a>
    <a href="关于.html">关于</a>
</div>

<div class="hero">
    <h1>预约试听</h1>
    <p>商河本地 · 上门辅导 · 先试听再决定</p>
</div>

<div class="container">
    <div class="card">
        <div class="section-title">预约信息</div>

        <form id="bookingForm" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="1c354c45-1cd9-466e-ba73-b63687c0df67">
            <input type="hidden" name="subject" value="思贤学习站·预约试听">

            <div class="form-group">
                <label>家长姓名</label>
                <input type="text" name="家长姓名" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
                <label>联系电话</label>
                <input type="text" name="联系电话" placeholder="方便我们联系您" required>
            </div>
            <div class="form-group">
                <label>学生年级</label>
                <select name="学生年级">
                    <option>小学</option>
                    <option>初一</option>
                    <option>初二</option>
                    <option>初三</option>
                    <option>高一</option>
                    <option>高二</option>
                    <option>高三</option>
                </select>
            </div>
            <div class="form-group">
                <label>辅导科目</label>
                <input type="text" name="辅导科目" placeholder="例如：数学、英语、物理">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea name="备注" placeholder="有什么想了解的，可以在这里说"></textarea>
            </div>
            <button class="submit-btn" type="submit" id="submitBtn">提交预约</button>
        </form>

        <div class="success-msg" id="successMsg">
            <div class="icon">✅</div>
            <h3>预约成功</h3>
            <p>感谢您的信任！我们会尽快联系您安排试听。</p>
        </div>

        <div class="contact-info">
            或<span class="contact-trigger" onclick="openShareWall()">联系老师</span>
        </div>
    </div>
</div>

<script>
document.getElementById('bookingForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var form = this;
    var formData = new FormData(form);

    btn.disabled = true;
    btn.textContent = '提交中...';

    fetch(form.action, {
        method: 'POST',
        body: formData
    }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.success) {
            form.style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        } else {
            alert('提交失败，请通过网站联系');
            btn.disabled = false;
            btn.textContent = '提交预约';
        }
    }).catch(function() {
        alert('网络异常，请稍后重试');
        btn.disabled = false;
        btn.textContent = '提交预约';
    });
});
</script>

<div class="footer">
    <p>思贤学习站 · 济南市商河县 · <span class="contact-trigger" onclick="openShareWall()">获取联系方式</span></p>
</div>


<button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部">↑</button>
<script>window.addEventListener('scroll',function(){document.querySelector('.back-to-top').classList.toggle('show',window.scrollY>300)});</script>
<div class="share-overlay" id="shareOverlay">
  <div class="share-modal">
    <div class="share-icon">🔗</div>
    <h3>分享即可获取联系方式</h3>
    <p class="share-desc">将此网站分享给微信好友或发到朋友圈</p>
    <div class="share-msg-box"><p id="shareText"></p></div>
    <button class="copy-btn" id="copyBtn">📋 复制分享文案</button>
    <p class="copy-hint" id="copyHint">复制后粘贴发送给微信好友或发到朋友圈</p>
    <button class="shared-btn" id="sharedBtn" disabled>我已分享，查看联系方式 →</button>
  </div>
</div>
<script>
(function() {
  var url = window.location.origin + window.location.pathname;
  var shareTxt = '📚 思贤学习站——学习资源 · AI 工具 · 课程笔记 · 考试整理。快来了解～ ' + url;
  var hasCopied = false;
  var overlay = document.getElementById('shareOverlay');
  var shareTextEl = document.getElementById('shareText');
  var copyBtn = document.getElementById('copyBtn');
  var copyHint = document.getElementById('copyHint');
  var sharedBtn = document.getElementById('sharedBtn');

  // 已分享过则直接显示联系方式
  if (localStorage.getItem('sx_shared')) {
    var ts = document.querySelectorAll('.contact-trigger');
    for (var i = 0; i < ts.length; i++) {
      ts[i].outerHTML = '<b>155-6412-8008</b>';
    }
  }

  window.openShareWall = function() {
    if (localStorage.getItem('sx_shared')) return;
    if (window._shareTimeout) clearTimeout(window._shareTimeout);
    shareTextEl.textContent = shareTxt;
    overlay.classList.add('active');
    hasCopied = false;
    sharedBtn.disabled = true;
    copyBtn.textContent = '📋 复制分享文案';
    copyBtn.classList.remove('copied');
    copyHint.textContent = '复制后粘贴发送给微信好友或发到朋友圈';

    // 离开后再回来：检查之前是否复制过
    var t = localStorage.getItem('sx_copy_time');
    if (t && Date.now() - Number(t) >= 10000) {
      hasCopied = true;
      sharedBtn.disabled = false;
      copyBtn.textContent = '✅ 已复制';
      copyBtn.classList.add('copied');
      copyHint.textContent = '✅ 点击下方按钮查看联系方式';
    }
  };

  copyBtn.addEventListener('click', function() {
    if (window._shareTimeout) clearTimeout(window._shareTimeout);
    var text = shareTextEl.textContent;
    function done() {
      localStorage.setItem('sx_copy_time', Date.now());
      copyBtn.textContent = '✅ 已复制';
      copyBtn.classList.add('copied');
      copyHint.textContent = '⏳ 检测到转发朋友圈，自动获取联系方式...';
      window._shareTimeout = setTimeout(function() {
        hasCopied = true;
        sharedBtn.disabled = false;
        copyHint.textContent = '✅ 点击下方按钮查看联系方式';
      }, 10000);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); done();
    }
  });

  sharedBtn.addEventListener('click', function() {
    if (!hasCopied) return;
    localStorage.setItem('sx_shared', '1');
    overlay.classList.remove('active');
    if (window._shareTimeout) clearTimeout(window._shareTimeout);
    var triggers = document.querySelectorAll('.contact-trigger');
    for (var i = 0; i < triggers.length; i++) {
      triggers[i].outerHTML = '<b>155-6412-8008</b>';
    }
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === this) {
      overlay.classList.remove('active');
      if (window._shareTimeout) clearTimeout(window._shareTimeout);
    }
  });
})();
</script>
</body>
</html>
